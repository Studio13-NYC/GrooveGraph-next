<article class="post-card">
    <a href="{{url}}" class="post-item">
        <div class="post-meta-row">
            <span class="post-date">{{published_human}}</span>
            <span class="post-route">Open Post</span>
        </div>
        <h3 class="post-title">{{title}}</h3>
        <p class="post-blurb">Signed dispatch from the Studio13 journal. Open the full post and discussion.</p>
    </a>
</article>
