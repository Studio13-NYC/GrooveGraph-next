<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GrooveGraph Next - CZA Control</title>
    <style>
      :root {
        --paper: #ffffff;
        --ink: #111111;
        --slate: #5a5654;
        --red-route: #ee352e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--paper);
        color: var(--ink);
        font-family: Helvetica, Arial, sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      section {
        width: min(1120px, 100%);
        background: rgba(255, 255, 255, 0.42);
        border: 2px solid var(--ink);
        box-shadow: 0 20px 50px rgba(17, 17, 17, 0.08);
      }

      .header {
        border-bottom: 2px solid var(--ink);
        padding: 28px 32px 28px;
        display: grid;
        gap: 14px;
      }

      .authority {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-weight: 800;
        letter-spacing: 0.02em;
        font-size: 14px;
        text-transform: uppercase;
      }

      .badge {
        display: inline-grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border-radius: 999px;
        background: var(--ink);
        color: var(--paper);
        font-size: 20px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 58px);
        line-height: 0.95;
        font-weight: 800;
      }

      .status {
        font-size: clamp(34px, 5vw, 62px);
        font-weight: 800;
        letter-spacing: 0.04em;
        line-height: 0.95;
        text-align: center;
        text-transform: uppercase;
        color: var(--red-route);
      }

      .body {
        margin: 4px 0 0;
        font-size: 14px;
        line-height: 1.5;
        color: var(--slate);
        text-align: left;
      }

      .graphic {
        padding: 28px;
      }

      .graphic img {
        width: 100%;
        height: auto;
        display: block;
        border: 2px solid rgba(17, 17, 17, 0.18);
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <div class="header">
          <div class="authority">
            <span class="badge">CZ</span>
            County Zoning Authority
          </div>
          <h1 id="banner">THIS APP IS NOW UNDER THE CONTROL OF THE CZA</h1>
          <div class="status" id="status">Service Suspended</div>
          <p class="body" id="body">
            This is the minimum viable smoke test: one homepage, one API, one graphic, and one very clear transfer of authority.
          </p>
        </div>

        <div class="graphic">
          <img src="./cza-map.png" alt="County Zoning Authority governance map" />
        </div>
      </section>
    </main>

    <script>
      async function loadBanner() {
        try {
          const response = await fetch("https://as-groovegraph-api.azurewebsites.net/api/smoke", { cache: "no-store" });
          if (!response.ok) return;
          const data = await response.json();
          document.getElementById("banner").textContent = data.banner;
          document.getElementById("status").textContent = data.status;
          document.getElementById("body").textContent = data.body;
        } catch {
          // Fallback copy is already rendered.
        }
      }

      loadBanner();
    </script>
  </body>
</html>
